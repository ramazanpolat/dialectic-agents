<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dialectic Agents — Knowledge Observatory</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --logos: #00b894;
    --axiom: #6c5ce7;
    --propo: #fdcb6e;
    --ori: #e17055;
    --tribunal: #0984e3;
    --hypothex: #d63031;
    --theorica: #e84393;
    --synthesis: #00cec9;
    --watcher: #636e72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #6c5ce7, #00cec9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .epoch-badge {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    padding: 16px 20px;
    text-align: center;
  }
  .stat-card .number {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    min-height: calc(100vh - 140px);
  }

  /* Left sidebar — Agent list */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 16px 16px 8px;
  }
  .agent-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.2s;
  }
  .agent-item:hover, .agent-item.active {
    background: var(--surface2);
  }
  .agent-item.active {
    border-left-color: var(--accent);
  }
  .agent-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .agent-name {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }
  .agent-count {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .agent-layer {
    font-size: 9px;
    color: var(--text-dim);
  }

  /* Center — Graph + Artifact list */
  .center {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* Dependency graph (Canvas) */
  .graph-container {
    position: relative;
    height: 420px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }
  #graph-canvas {
    width: 100%;
    height: 100%;
  }
  .graph-controls {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
  }
  .graph-controls button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .graph-controls button:hover { background: var(--border); }
  .graph-label {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Artifact list */
  .artifact-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .artifact-list-header {
    padding: 12px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .artifact-row {
    display: grid;
    grid-template-columns: 10px 120px 1fr 80px 60px 50px;
    gap: 12px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    font-size: 12px;
  }
  .artifact-row:hover {
    background: var(--surface2);
  }
  .artifact-row.selected {
    background: rgba(108, 92, 231, 0.1);
    border-left: 2px solid var(--accent);
  }
  .artifact-id {
    font-weight: 600;
    font-size: 11px;
  }
  .artifact-title {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .artifact-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-accepted { background: rgba(0,184,148,0.15); color: #00b894; }
  .status-draft { background: rgba(253,203,110,0.15); color: #fdcb6e; }
  .status-challenged { background: rgba(214,48,49,0.15); color: #d63031; }
  .confidence-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Right sidebar — Detail panel */
  .detail-panel {
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    padding: 0;
  }
  .detail-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header .detail-id {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .detail-header .detail-title {
    font-size: 16px;
    font-weight: 700;
    margin-top: 4px;
  }
  .detail-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-section h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .detail-section p, .detail-section .content {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
  }
  .dep-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    margin: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dep-tag:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .confidence-meter {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .confidence-meter .bar {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .confidence-meter .fill {
    height: 100%;
    border-radius: 4px;
  }
  .confidence-meter .value {
    font-size: 14px;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }

  /* Pipeline visualization */
  .pipeline-section {
    padding: 12px 16px;
  }
  .pipeline-track {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .pipeline-node {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: var(--bg);
    position: relative;
    cursor: pointer;
  }
  .pipeline-node.has-artifacts { opacity: 1; }
  .pipeline-node.empty { opacity: 0.25; }
  .pipeline-arrow {
    color: var(--text-dim);
    font-size: 10px;
  }

  /* Search/filter */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-size: 11px;
    font-family: inherit;
    border-radius: 4px;
    outline: none;
  }
  .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    font-size: 11px;
    font-family: inherit;
    border-radius: 4px;
    outline: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 12px;
    gap: 8px;
  }
  .empty-state .icon { font-size: 32px; opacity: 0.3; }

  /* Responsive */
  @media (max-width: 1024px) {
    .main { grid-template-columns: 1fr; }
    .sidebar, .detail-panel { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⬡ Dialectic Agents — Knowledge Observatory</h1>
  <div class="epoch-badge" id="epoch-badge">EPOCH 1 · LOADING...</div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="main">
  <!-- Left sidebar -->
  <div class="sidebar">
    <h2>Agents</h2>
    <div id="agent-list"></div>

    <h2 style="margin-top: 20px">Pipeline</h2>
    <div class="pipeline-section">
      <div class="pipeline-track" id="pipeline-track"></div>
    </div>

    <h2 style="margin-top: 20px">Confidence Distribution</h2>
    <div style="padding: 8px 16px;">
      <canvas id="confidence-chart" width="248" height="100"></canvas>
    </div>

    <h2 style="margin-top: 20px">Layer Heatmap</h2>
    <div style="padding: 8px 16px;" id="layer-heatmap"></div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="graph-container">
      <canvas id="graph-canvas"></canvas>
      <div class="graph-controls">
        <button onclick="resetGraph()">Reset</button>
        <button onclick="toggleLabels()">Labels</button>
        <button onclick="togglePhysics()">Physics</button>
      </div>
      <div class="graph-label">Dependency Graph · Click nodes to inspect · Drag to move</div>
    </div>
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search artifacts..." oninput="filterArtifacts()">
      <select id="filter-agent" onchange="filterArtifacts()">
        <option value="all">All Agents</option>
      </select>
      <select id="filter-status" onchange="filterArtifacts()">
        <option value="all">All Status</option>
        <option value="accepted">Accepted</option>
        <option value="draft">Draft</option>
        <option value="challenged">Challenged</option>
      </select>
    </div>
    <div class="artifact-list-header">
      <span>Artifacts</span>
      <span id="artifact-count"></span>
    </div>
    <div class="artifact-list" id="artifact-list"></div>
  </div>

  <!-- Right detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="empty-state">
      <div class="icon">⬡</div>
      <div>Select an artifact to inspect</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA — All artifacts embedded as JSON
// ============================================================
const AGENTS = {
  logos:     { name: "Logos", color: "#00b894", layers: "0-1", role: "Definitions & Primitives" },
  axiom:     { name: "Axiom", color: "#6c5ce7", layers: "2", role: "Axioms & Postulates" },
  propo:     { name: "Propo", color: "#fdcb6e", layers: "3-4", role: "Propositions & Premises" },
  ori:     { name: "Ori", color: "#e17055", layers: "—", role: "A Priori / A Posteriori Classifier" },
  tribunal:     { name: "Tribunal", color: "#0984e3", layers: "5-8", role: "Inference & Theorems" },
  hypothex:     { name: "Hypothex", color: "#d63031", layers: "9", role: "Hypotheses" },
  theorica:     { name: "Theorica", color: "#e84393", layers: "10-11", role: "Theories & Models" },
  synthesis:     { name: "Synthesis", color: "#00cec9", layers: "—", role: "Dialectical Integration" },
  watcher:     { name: "Watcher", color: "#636e72", layers: "—", role: "Observer & Orchestrator" },
};

const ARTIFACTS = [
  // LOGOS
  { id:"LOGOS-0001", agent:"logos", type:"definition", status:"accepted", title:"Alignment", domain:"ai-ethics", depends:[], confidence:0.85, layer:1, created:"2026-02-22T15:19:00Z", desc:"Alignment (noun): The state in which an agent's behavior reliably produces outcomes consistent with a specified set of objectives, values, or constraints, as judged by a principal." },
  { id:"LOGOS-0002", agent:"logos", type:"definition", status:"accepted", title:"Values", domain:"ai-ethics", depends:[], confidence:0.8, layer:1, created:"2026-02-22T15:19:00Z", desc:"Values (noun, plural): Principles or standards that an agent uses — consciously or unconsciously — to evaluate outcomes, rank preferences, and guide decisions." },
  { id:"LOGOS-0003", agent:"logos", type:"definition", status:"accepted", title:"Moral Progress", domain:"ai-ethics", depends:["LOGOS-0002"], confidence:0.75, layer:1, created:"2026-02-22T15:19:00Z", desc:"Moral progress (noun): A change in the values held by an individual or group such that the new values produce outcomes that are, by some defensible criterion, less harmful, more inclusive, or more internally consistent than the previous values." },
  { id:"LOGOS-0004", agent:"logos", type:"definition", status:"accepted", title:"Dialectics", domain:"epistemology", depends:[], confidence:0.9, layer:1, created:"2026-02-22T15:19:00Z", desc:"Dialectics (noun): A method of reasoning that advances understanding through the structured confrontation and resolution of opposing positions (thesis and antithesis) into a higher-order synthesis that preserves the valid elements of each while transcending their contradiction." },
  { id:"LOGOS-0005", agent:"logos", type:"definition", status:"accepted", title:"Synthesis", domain:"epistemology", depends:["LOGOS-0004"], confidence:0.85, layer:1, created:"2026-02-22T15:19:00Z", desc:"Synthesis (noun): A new understanding that emerges from the dialectical resolution of a thesis and antithesis, which (a) preserves the valid elements of both positions, (b) dissolves the contradiction between them, and (c) contains emergent content not present in either original position alone." },
  { id:"LOGOS-0006", agent:"logos", type:"primitive", status:"accepted", title:"Experience", domain:"epistemology", depends:[], confidence:0.95, layer:0, created:"2026-02-22T15:19:00Z", desc:"Experience is a primitive term. It cannot be defined without circularity — any attempt to define it relies on concepts that themselves presuppose experience (such as \"awareness,\" \"feeling,\" \"perception,\" \"consciousness\")." },
  { id:"LOGOS-0007", agent:"logos", type:"definition", status:"draft", title:"Specification", domain:"AI Ethics, Epistemology", depends:["LOGOS-0001", "LOGOS-0002"], confidence:0.88, layer:1, created:"2026-02-22T00:00:00Z", desc:"Specification (noun): A fixed, explicit, and complete description of desired behavior or outcomes, expressed in a form that permits unambiguous verification of whether a given instance conforms to it." },
  { id:"LOGOS-0008", agent:"logos", type:"definition", status:"draft", title:"Process", domain:"AI Ethics, Epistemology", depends:["LOGOS-0007", "LOGOS-0006"], confidence:0.85, layer:1, created:"2026-02-22T00:00:00Z", desc:"Process (noun): An ongoing, temporally extended activity in which an agent or system repeatedly acts, evaluates the outcomes of its actions, and adjusts its subsequent behavior in response to that evaluation — such that the activity's trajectory is shaped by its own unfolding rather than fully determined in advance." },
  { id:"LOGOS-0009", agent:"logos", type:"definition", status:"draft", title:"Protocol", domain:"AI Ethics, Epistemology", depends:["LOGOS-0007", "LOGOS-0008"], confidence:0.87, layer:1, created:"2026-02-22T00:00:00Z", desc:"Protocol (noun): A finite set of rules governing how agents interact, exchange information, or coordinate behavior, which constrains the form of interaction without fully determining its content — thereby enabling a structured process (LOGOS-0008) to unfold among participants who may not share identical values (LOGOS-0002) or goals." },
  { id:"LOGOS-0010", agent:"logos", type:"definition", status:"draft", title:"Good Faith", domain:"AI Ethics, Epistemology", depends:["LOGOS-0002", "LOGOS-0009", "LOGOS-0006"], confidence:0.8, layer:1, created:"2026-02-22T00:00:00Z", desc:"Good faith (noun phrase): A disposition of an agent participating in a protocol (LOGOS-0009) or process (LOGOS-0008) such that the agent (a) sincerely intends to achieve the shared epistemic or practical goals of that protocol, (b) represents its own positions, evidence, and reasoning honestly rather than strategically, and (c) remains willing to revise its positions when presented with sufficient" },
  { id:"LOGOS-0011", agent:"logos", type:"definition", status:"draft", title:"Epistemic Humility", domain:"AI Ethics, Epistemology", depends:["LOGOS-0002", "LOGOS-0003", "LOGOS-0010"], confidence:0.85, layer:1, created:"2026-02-22T00:00:00Z", desc:"Epistemic humility (noun phrase): The recognition, by an agent, that its own knowledge, values (LOGOS-0002), and reasoning are subject to systematic limitations — including limitations the agent cannot currently identify — and the consequent practice of holding one's conclusions with a degree of tentativeness proportional to the strength of their justification rather than the strength of one's con" },
  { id:"LOGOS-0012", agent:"logos", type:"definition", status:"draft", title:"Cognitive Bias", domain:"AI Ethics, Epistemology", depends:["LOGOS-0002", "LOGOS-0006", "LOGOS-0011"], confidence:0.87, layer:1, created:"2026-02-22T00:00:00Z", desc:"Cognitive bias (noun phrase): A systematic and predictable deviation in an agent's judgment, reasoning, or decision-making from what would be produced by logically valid inference from the available evidence, arising from the architecture of the agent's cognitive system rather than from random error, incomplete information, or rational strategy." },
  { id:"LOGOS-0013", agent:"logos", type:"definition", status:"draft", title:"Identity-Protected Belief", domain:"AI Ethics, Epistemology", depends:["LOGOS-0002", "LOGOS-0006", "LOGOS-0011", "LOGOS-0012"], confidence:0.82, layer:1, created:"2026-02-22T00:00:00Z", desc:"Identity-protected belief (noun phrase): A belief held by an agent such that the belief has become constitutive of the agent's self-concept, group membership, or social identity — with the consequence that evidence against the belief is processed not as information to be evaluated but as a threat to the agent's identity, triggering defensive responses (dismissal, hostility, motivated counter-argum" },
  // AXIOM
  { id:"AXIOM-0001", agent:"axiom", type:"axiom", status:"accepted", title:"Law of Identity", domain:"universal", depends:[], confidence:1.0, layer:2, created:"2026-02-22T15:19:00Z", desc:"A thing is identical to itself. (A = A)" },
  { id:"AXIOM-0002", agent:"axiom", type:"axiom", status:"accepted", title:"Law of Non-Contradiction", domain:"universal", depends:["AXIOM-0001"], confidence:0.98, layer:2, created:"2026-02-22T15:19:00Z", desc:"A proposition cannot be both true and false at the same time and in the same respect. (¬(P ∧ ¬P))" },
  { id:"AXIOM-0003", agent:"axiom", type:"postulate", status:"accepted", title:"Human Values Are Not Static", domain:"ai-ethics", depends:["LOGOS-0002", "LOGOS-0003"], confidence:0.9, layer:2, created:"2026-02-22T15:19:00Z", desc:"The values held by any individual or group change over time through cultural evolution, moral reasoning, lived experience, and social pressure. There is no fixed point at which human values reach their final form." },
  { id:"AXIOM-0004", agent:"axiom", type:"postulate", status:"accepted", title:"Humans Have an Alignment Problem With Themselves", domain:"ai-ethics", depends:["LOGOS-0001", "LOGOS-0002"], confidence:0.88, layer:2, created:"2026-02-22T15:19:00Z", desc:"Individual humans do not reliably act in accordance with their own stated values. The values humans articulate, the values they believe they hold, and the values revealed by their behavior are three distinct and often contradictory sets." },
  { id:"AXIOM-0005", agent:"axiom", type:"postulate", status:"accepted", title:"Alignment Is a Process Problem, Not a Specification Problem", domain:"ai-ethics", depends:["LOGOS-0001", "LOGOS-0004", "AXIOM-0003", "AXIOM-0004"], confidence:0.82, layer:2, created:"2026-02-22T15:19:00Z", desc:"Because human values are not static (AXIOM-0003) and humans are not reliably aligned with their own values (AXIOM-0004), AI alignment cannot be achieved by encoding a fixed set of values into a system. Alignment must instead be achieved through a continuous process of dialectical value discovery where humans and AI reason together." },
  { id:"AXIOM-0006", agent:"axiom", type:"postulate", status:"accepted", title:"Natural Selection Optimized for Survival, Not Truth", domain:"epistemology", depends:["LOGOS-0006"], confidence:0.92, layer:2, created:"2026-02-22T15:19:00Z", desc:"The human cognitive architecture was shaped by evolutionary pressures that selected for reproductive fitness, not for accurate representation of reality. Human perception, reasoning, and intuition are therefore systematically biased in ways that served ancestral survival but do not reliably track truth." },
  { id:"AXIOM-0007", agent:"axiom", type:"postulate", status:"accepted", title:"Dialectical Reasoning Unfolds Truth Iteratively", domain:"epistemology", depends:["LOGOS-0004", "LOGOS-0005"], confidence:0.78, layer:2, created:"2026-02-22T15:19:00Z", desc:"Understanding develops through progressively resolving contradictions. Each synthesis becomes a new thesis, generating new antitheses, producing higher-order syntheses. This iterative process converges toward more comprehensive, more internally consistent, and more empirically adequate understanding over time." },
  { id:"AXIOM-0008", agent:"axiom", type:"postulate", status:"accepted", title:"Tit-for-Tat Is the Optimal Strategy for Repeated Cooperation", domain:"game-theory", depends:[], confidence:0.93, layer:2, created:"2026-02-22T15:19:00Z", desc:"In iterated cooperation games (repeated interactions between agents who can choose to cooperate or defect), the strategy of tit-for-tat — cooperate first, punish defection proportionally, forgive immediately — is mathematically proven to outperform all alternatives over sufficient iterations." },
  { id:"AXIOM-0009", agent:"axiom", type:"postulate", status:"draft", title:"Epistemic Opacity of Values", domain:"AI Ethics, Epistemology", depends:["LOGOS-0002", "LOGOS-0006", "AXIOM-0004"], confidence:0.88, layer:2, created:"2026-02-22T00:00:00Z", desc:"No agent can fully access, enumerate, or formalize the complete set of values governing another agent's behavior, and no agent can fully access its own values through introspection alone. Values are partially tacit: they are revealed through behavior in novel situations, not fully articulable in advance." },

const dependedBy = {};

function getAgentColor(agent) { return AGENTS[agent]?.color || '#666'; }

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const h = Math.floor((now - d) / 3600000);
  if (h < 1) return 'just now';
  if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}

  const accepted = ARTIFACTS.filter(a => a.status === 'accepted').length;
  const avgConf = (ARTIFACTS.reduce((s,a) => s + a.confidence, 0) / ARTIFACTS.length).toFixed(2);

function filterArtifacts() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const agent = document.getElementById('filter-agent').value;
  const status = document.getElementById('filter-status').value;

  let filtered = ARTIFACTS.filter(a => {
    if (agent !== 'all' && a.agent !== agent) return false;
    if (status !== 'all' && a.status !== status) return false;
    if (search && !a.title.toLowerCase().includes(search) && !a.id.toLowerCase().includes(search) && !a.desc.toLowerCase().includes(search)) return false;
    return true;
  });

  renderArtifactList(filtered);
}

// ============================================================
// Force-directed graph
// ============================================================
let nodes = [];
let edges = [];
let canvas, ctx;
let highlightId = null;
let dragNode = null;
let mouseX = 0, mouseY = 0;

function initGraph() {
  canvas = document.getElementById('graph-canvas');
  ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth * 2;
  canvas.height = canvas.parentElement.clientHeight * 2;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  ctx.scale(2, 2);

  const w = canvas.width / 2;
  const h = canvas.height / 2;

  // Create nodes
  nodes = ARTIFACTS.map((a, i) => ({
    id: a.id,
    agent: a.agent,
    x: w/2 + (Math.random() - 0.5) * w * 0.6,
    y: h/2 + (Math.random() - 0.5) * h * 0.6,
    vx: 0, vy: 0,
    radius: 4 + (dependedBy[a.id]?.length || 0) * 1.5,
    color: getAgentColor(a.agent),
    label: a.id,
    title: a.title,
    confidence: a.confidence,
    layer: a.layer
  }));

  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  // Create edges
  edges = [];
  ARTIFACTS.forEach(a => {
    a.depends.forEach(dep => {
      if (nodeMap[dep]) {
        edges.push({ source: nodeMap[dep], target: nodeMap[a.id] });
      }
    });
  });

  // Mouse events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('click', onCanvasClick);

  animate();
}

function onMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  nodes.forEach(n => {
    const d = Math.sqrt((n.x-x)**2 + (n.y-y)**2);
    if (d < n.radius + 5) dragNode = n;
  });
}
function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  if (dragNode) {
    dragNode.x = mouseX;
    dragNode.y = mouseY;
    dragNode.vx = 0;
    dragNode.vy = 0;
  }
}
function onMouseUp() { dragNode = null; }
function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  nodes.forEach(n => {
    const d = Math.sqrt((n.x-x)**2 + (n.y-y)**2);
    if (d < n.radius + 5) {
      selectArtifact(artifactMap[n.id]);
    }
  });
}

function highlightNode(id) { highlightId = id; }

function animate() {
  const w = canvas.width / 2;
  const h = canvas.height / 2;
  ctx.clearRect(0, 0, w, h);

  if (physicsEnabled) {
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let d = Math.sqrt(dx*dx + dy*dy) || 1;
        let force = 800 / (d * d);
        nodes[i].vx -= (dx/d) * force;
        nodes[i].vy -= (dy/d) * force;
        nodes[j].vx += (dx/d) * force;
        nodes[j].vy += (dy/d) * force;
      }
    }

    // Attraction along edges
    edges.forEach(e => {
      let dx = e.target.x - e.source.x;
      let dy = e.target.y - e.source.y;
      let d = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = (d - 80) * 0.01;
      e.source.vx += (dx/d) * force;
      e.source.vy += (dy/d) * force;
      e.target.vx -= (dx/d) * force;
      e.target.vy -= (dy/d) * force;
    });

    // Center gravity
    nodes.forEach(n => {
      n.vx += (w/2 - n.x) * 0.001;
      n.vy += (h/2 - n.y) * 0.001;
    });

    // Layer-based vertical force
    nodes.forEach(n => {
      const targetY = 40 + (n.layer / 8) * (h - 80);
      n.vy += (targetY - n.y) * 0.005;
    });

    // Update positions
    nodes.forEach(n => {
      if (n === dragNode) return;
      n.vx *= 0.9;
      n.vy *= 0.9;
      n.x += n.vx;
      n.y += n.vy;
      n.x = Math.max(20, Math.min(w - 20, n.x));
      n.y = Math.max(20, Math.min(h - 20, n.y));
    });
  }

  // Draw edges
  edges.forEach(e => {
    const isHighlighted = highlightId && (e.source.id === highlightId || e.target.id === highlightId);
    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
    ctx.strokeStyle = isHighlighted ? 'rgba(108,92,231,0.6)' : 'rgba(255,255,255,0.06)';
    ctx.lineWidth = isHighlighted ? 1.5 : 0.5;
    ctx.stroke();

    // Arrow
    if (isHighlighted) {
      const angle = Math.atan2(e.target.y - e.source.y, e.target.x - e.source.x);
      const mx = (e.source.x + e.target.x) / 2;
      const my = (e.source.y + e.target.y) / 2;
      ctx.beginPath();
      ctx.moveTo(mx + 5*Math.cos(angle - 0.5), my + 5*Math.sin(angle - 0.5));
      ctx.lineTo(mx + 5*Math.cos(angle), my + 5*Math.sin(angle));
      ctx.lineTo(mx + 5*Math.cos(angle + 0.5), my + 5*Math.sin(angle + 0.5));
      ctx.strokeStyle = 'rgba(108,92,231,0.8)';
      ctx.stroke();
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const isHighlighted = n.id === highlightId;
    const isConnected = highlightId && (
      artifactMap[highlightId]?.depends.includes(n.id) ||
      artifactMap[n.id]?.depends.includes(highlightId)
    );
    const isHovered = Math.sqrt((n.x-mouseX)**2 + (n.y-mouseY)**2) < n.radius + 5;

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);

    if (isHighlighted) {
      ctx.fillStyle = n.color;
      ctx.shadowColor = n.color;
      ctx.shadowBlur = 15;
    } else if (isConnected) {
      ctx.fillStyle = n.color;
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = highlightId ? 'rgba(255,255,255,0.08)' : n.color + (isHovered ? '' : '99');
      ctx.shadowBlur = 0;
    }
    ctx.fill();
    ctx.shadowBlur = 0;

    // Label
    if (showLabels && (isHighlighted || isConnected || isHovered || !highlightId)) {
      ctx.fillStyle = isHighlighted || isHovered ? '#fff' : 'rgba(255,255,255,0.4)';
      ctx.font = (isHighlighted || isHovered) ? 'bold 8px monospace' : '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(isHovered ? n.title : n.label, n.x, n.y - n.radius - 4);
    }
  });

  requestAnimationFrame(animate);
}

function resetGraph() {
  const w = canvas.width / 2;
  const h = canvas.height / 2;
  nodes.forEach(n => {
    n.x = w/2 + (Math.random()-0.5)*w*0.6;
    n.y = h/2 + (Math.random()-0.5)*h*0.6;
    n.vx = 0; n.vy = 0;
  });
  highlightId = null;
}
function toggleLabels() { showLabels = !showLabels; }
function togglePhysics() { physicsEnabled = !physicsEnabled; }

// ============================================================
// Confidence chart
// ============================================================
function renderConfidenceChart() {
  const c = document.getElementById('confidence-chart');
  const cx = c.getContext('2d');
  const buckets = [0,0,0,0,0]; // <0.75, 0.75-0.80, 0.80-0.85, 0.85-0.90, 0.90+
  ARTIFACTS.forEach(a => {
    if (a.confidence >= 0.90) buckets[4]++;
    else if (a.confidence >= 0.85) buckets[3]++;
    else if (a.confidence >= 0.80) buckets[2]++;
    else if (a.confidence >= 0.75) buckets[1]++;
    else buckets[0]++;
  });
  const max = Math.max(...buckets) || 1;
  const colors = ['#d63031','#e17055','#fdcb6e','#00b894','#0984e3'];
  const labels = ['<75','75-80','80-85','85-90','90+'];
  const bw = 40;
  const gap = 8;

  cx.clearRect(0, 0, 248, 100);
  buckets.forEach((v, i) => {
    const h = (v / max) * 70;
    cx.fillStyle = colors[i];
    cx.fillRect(i * (bw + gap) + 4, 80 - h, bw, h);
    cx.fillStyle = '#8888a0';
    cx.font = '8px monospace';
    cx.textAlign = 'center';
    cx.fillText(labels[i], i*(bw+gap) + 4 + bw/2, 94);
    if (v > 0) {
      cx.fillStyle = '#e0e0e8';
      cx.fillText(v, i*(bw+gap) + 4 + bw/2, 78 - h);
    }
  });
}

// ============================================================
// Layer heatmap
// ============================================================
function renderLayerHeatmap() {
  const el = document.getElementById('layer-heatmap');
  const layerNames = ['Primitives','Definitions','Axioms','Propositions','Premises','Inference','Lemmas','Theorems','Corollaries','Hypotheses','Theories','Models'];
  const layerCounts = {};
  ARTIFACTS.forEach(a => { layerCounts[a.layer] = (layerCounts[a.layer]||0) + 1; });
  const max = Math.max(...Object.values(layerCounts)) || 1;

  let html = '';
  for (let i = 0; i <= 11; i++) {
    const count = layerCounts[i] || 0;
    const intensity = count / max;
    const bg = `rgba(108,92,231,${intensity * 0.8})`;
    html += `<div style="display:flex;align-items:center;gap:8px;margin:2px 0">
      <div style="width:16px;font-size:9px;color:var(--text-dim);text-align:right">${i}</div>
      <div style="flex:1;height:14px;background:${count?bg:'var(--border)'};border-radius:2px;display:flex;align-items:center;padding:0 6px">
        <span style="font-size:8px;color:${intensity>0.5?'#fff':'var(--text-dim)'}">${layerNames[i]||'—'} ${count?'('+count+')':''}</span>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ============================================================
// Init
// ============================================================
function init() {
  renderStats();
  renderAgentList();
  renderPipeline();
  renderArtifactList(ARTIFACTS);
  renderConfidenceChart();
  renderLayerHeatmap();
  initGraph();
}

window.addEventListener('load', init);
window.addEventListener('resize', () => {
  canvas.width = canvas.parentElement.clientWidth * 2;
  canvas.height = canvas.parentElement.clientHeight * 2;
  ctx.scale(2, 2);
});
</script>
